# docker-compose.prod.yml
version: '3.8'

services:
  api:
    build: .
    container_name: svitliachok_api_prod
    restart: always
    ports:
      - "80:8000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: pgrouting/pgrouting:latest
    container_name: svitliachok_db_prod
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: svitliachok
    volumes:
      - pgdata_prod:/var/lib/postgresql/data

volumes:
  pgdata_prod: